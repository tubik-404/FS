<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Login</title>
<style>
input[type="file"] {
    margin-bottom: 20px;
}
input {
  width: 100%;
}
img {
    width: 100%
}
body {
    font-family: Arial, sans-serif;
    background-color: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
form {
    background: #fff;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    width: 300px;
}
button, a {
    width: 100%;
    box-sizing: border-box; /* чтобы padding и border не выходили за границы */
    margin-bottom: 15px; /* добавляем отступы между элементами */
    display: block; /* чтобы элементы занимали всю ширину */
}

input[type="file"] {
    margin-bottom: 20px;
}
button {
    padding: 10px;
    background-color: #007BFF;
    color: #fff;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    width: 100%;
    cursor: pointer;
}
button:hover {
    background-color: #0056b3;
}

a {
    display: block;
    padding: 10px;
    background-color: #007BFF;
    color: #fff;
    border-radius: 5px;
    font-size: 16px;
    text-decoration: none;
    display: block;
    text-align: center;
    width: 100%;
}
a:hover {
    text-decoration: none;
    background-color: #0056b3;
}
input {
  width: 97%;
}
</style>
</head>
<body>
<form method="POST" enctype="multipart/form-data">
    <h2 style="text-align:center;">Логин</h2>
    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}
    Имя пользователя: <input type="text" name="username"><br>
    Пароль: <input type="password" name="password"><br>
    <p>
        <img src="{{ url_for('captcha') }}" alt="Капча"/><br/>
        <input type="text" name="captcha_input" required />
    </p>
    <button type="submit">Войти</button>
    <a href="{{ url_for('registration') }}">Регистрация</a>
</form>
</body>
</html>
