<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Список файлов</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f0f2f5;
    margin: 0;
    padding: 20px;
}
h1 {
    text-align: center;
}
table {
    width: 100%;
    max-width: 800px;
    margin: 0 auto;
    border-collapse: collapse;
}
td {
    padding: 12px;
    border: 1px solid #ddd;
    text-align: left;
}
th {
    padding: 12px;
    border: 1px solid #ddd;
    text-align: center;
    background-color: #007BFF;
    color: #fff;
}
a.button {
    display: inline-block;
    padding: 8px 12px;
    background-color: #28a745;
    color: #fff;
    border-radius: 4px;
    text-decoration: none;
}
a.button:hover {
    background-color: #218838;
}
</style>
</head>
<body>
<h1>Файлы на сервере</h1>
<table>
    <tr>
        <th>Имя файла</th>
        <th colspan="2">Действия</th>
    </tr>
    {% for file in files %}
    <tr>
        <td>{{ file }}</td>
        <td>
            <a class="button" href="{{ url_for('download_file', filename=file) }}">Скачать</a>
        </td>
        <td>
            <a class="button" href="{{ url_for('delete_file', filename=file) }}">Удалить</a>
        </td>
    </tr>
    {% else %}
    <tr>
        <td colspan="2" style="text-align:center;">Файлы не найдены</td>
    </tr>
    {% endfor %}
</table>
<div style="text-align: center; margin-top: 20px;">
    <a href="{{ url_for('upload') }}">Загрузить еще файл</a> | <a href="{{ url_for('home') }}">На главную</a> | <a href="{{ url_for('logout') }}">Выйти</a>
</div>
</body>
</html>
